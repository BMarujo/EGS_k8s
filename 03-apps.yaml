apiVersion: v1
kind: Service
metadata:
  name: auth-frontend
spec:
  selector:
    app: auth-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-frontend
  template:
    metadata:
      labels:
        app: auth-frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /templates/login.html
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /templates/login.html
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: auth-templates
              mountPath: /usr/share/nginx/html/templates
              readOnly: true
            - name: auth-css
              mountPath: /usr/share/nginx/html/static/css
              readOnly: true
      volumes:
        - name: auth-templates
          configMap:
            name: auth-frontend-templates
        - name: auth-css
          configMap:
            name: auth-frontend-static-css
---
