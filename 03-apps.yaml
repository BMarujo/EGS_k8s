apiVersion: v1
kind: Service
metadata:
  name: composer
spec:
  selector:
    app: composer
  ports:
    - name: http
      port: 8000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: composer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: composer
  template:
    metadata:
      labels:
        app: composer
    spec:
      containers:
        - name: composer
          image: egs-composer
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: AUTH_SERVICE_URL
            - name: INVENTORY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: INVENTORY_SERVICE_URL
            - name: PAYMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: PAYMENT_SERVICE_URL
            - name: PAYMENT_PUBLIC_URL
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: PAYMENT_PUBLIC_URL
            - name: COMPOSER_CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: COMPOSER_CORS_ORIGINS
            - name: COMPOSER_BROWSER_RETURN_TO_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: COMPOSER_BROWSER_RETURN_TO_ORIGINS
            - name: BROWSER_HANDOFF_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: BROWSER_HANDOFF_TTL_SECONDS
            - name: INVENTORY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: egs-secrets
                  key: INVENTORY_API_KEY
            - name: PAYMENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: egs-secrets
                  key: PAYMENT_API_KEY
            - name: INTERNAL_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: egs-secrets
                  key: INTERNAL_SERVICE_KEY
            - name: EVENT_MUTATIONS_REQUIRE_ADMIN
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: EVENT_MUTATIONS_REQUIRE_ADMIN
            - name: EVENT_ADMIN_ROLES
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: EVENT_ADMIN_ROLES
            - name: VAULT_ADDR
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: VAULT_ADDR
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: egs-secrets
                  key: VAULT_TOKEN
            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: OTEL_ENABLED
            - name: OTEL_SERVICE_NAME
              value: composer
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_METRIC_EXPORT_INTERVAL_MS
              valueFrom:
                configMapKeyRef:
                  name: egs-config
                  key: OTEL_METRIC_EXPORT_INTERVAL_MS
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
